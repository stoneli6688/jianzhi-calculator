<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>减脂热量计算器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .calculator {
    background: #fff;
    border-radius: 20px;
    padding: 36px 32px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  h1 {
    text-align: center;
    font-size: 24px;
    margin-bottom: 6px;
    color: #1a1a2e;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-bottom: 24px;
  }
  .form-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 5px;
  }
  input, select {
    width: 100%;
    padding: 10px 14px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 15px;
    transition: border-color 0.2s;
    outline: none;
  }
  input:focus, select:focus { border-color: #0f3460; }
  .gender-group {
    display: flex;
    gap: 12px;
  }
  .gender-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    font-size: 15px;
    text-align: center;
    transition: all 0.2s;
  }
  .gender-btn.active {
    border-color: #0f3460;
    background: #0f3460;
    color: #fff;
  }
  .btn-calc {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #0f3460, #e94560);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .btn-calc:hover { opacity: 0.9; }
  .result {
    margin-top: 24px;
    display: none;
  }
  .result.show { display: block; }
  .result-card {
    background: #f8f9fa;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    text-align: center;
  }
  .result-card .value {
    font-size: 36px;
    font-weight: 700;
    color: #0f3460;
  }
  .result-card .unit {
    font-size: 14px;
    color: #666;
  }
  .result-row {
    display: flex;
    gap: 12px;
  }
  .result-row .result-card {
    flex: 1;
  }
  .result-row .result-card .value {
    font-size: 22px;
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-lose  { background: #ffe0e0; color: #c0392b; }
  .tag-keep  { background: #e0f0e0; color: #27ae60; }
  .tag-gain  { background: #e0e8ff; color: #2980b9; }
</style>
</head>
<body>

<div class="calculator">
  <h1>减脂热量计算器</h1>
  <p class="subtitle">基于 Mifflin-St Jeor 公式</p>

  <div class="form-group gender-group">
    <div class="gender-btn active" data-gender="male">男性</div>
    <div class="gender-btn" data-gender="female">女性</div>
  </div>

  <div class="form-group">
    <label>年龄（岁）</label>
    <input type="number" id="age" placeholder="例如 25" min="10" max="120">
  </div>

  <div class="form-group">
    <label>身高（cm）</label>
    <input type="number" id="height" placeholder="例如 170" min="100" max="250" step="0.1">
  </div>

  <div class="form-group">
    <label>体重（kg）</label>
    <input type="number" id="weight" placeholder="例如 70" min="30" max="300" step="0.1">
  </div>

  <div class="form-group">
    <label>活动水平</label>
    <select id="activity">
      <option value="1.2">久坐不动（几乎不运动）</option>
      <option value="1.375">轻度活动（每周 1-3 天）</option>
      <option value="1.55">中度活动（每周 3-5 天）</option>
      <option value="1.725">高度活动（每周 6-7 天）</option>
      <option value="1.9">极高强度（体力劳动 / 每天高强度训练）</option>
    </select>
  </div>

  <div class="form-group">
    <label>目标</label>
    <select id="goal">
      <option value="lose">减脂（每周减 0.5 kg）</option>
      <option value="lose-fast">快速减脂（每周减 1 kg）</option>
      <option value="keep">维持体重</option>
      <option value="gain">增肌（每周增 0.5 kg）</option>
    </select>
  </div>

  <button class="btn-calc" onclick="calculate()">计算热量</button>

  <div class="result" id="result">
    <div class="result-card">
      <div class="value" id="tdee">--</div>
      <div class="unit">每日总消耗 (TDEE) · kcal</div>
    </div>
    <div class="result-row">
      <div class="result-card">
        <div class="value" id="bmr">--</div>
        <div class="unit">基础代谢 (BMR) · kcal</div>
      </div>
      <div class="result-card">
        <div class="value" id="target">--</div>
        <div class="unit">目标摄入 · kcal/天</div>
      </div>
    </div>
    <div class="result-card" id="macro-card" style="text-align:left;display:none;">
      <div style="font-weight:700;margin-bottom:10px;">推荐营养素配比</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span>蛋白质</span><span id="macro-protein" style="font-weight:600;">-- g</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
        <span>脂肪</span><span id="macro-fat" style="font-weight:600;">-- g</span>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span>碳水</span><span id="macro-carbs" style="font-weight:600;">-- g</span>
      </div>
    </div>
  </div>
</div>

<script>
let gender = 'male';

document.querySelectorAll('.gender-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    gender = btn.dataset.gender;
  });
});

function calculate() {
  const age = +document.getElementById('age').value;
  const height = +document.getElementById('height').value;
  const weight = +document.getElementById('weight').value;
  const activity = +document.getElementById('activity').value;
  const goal = document.getElementById('goal').value;

  if (!age || !height || !weight) {
    alert('请填写所有身体数据');
    return;
  }

  // Mifflin-St Jeor
  let bmr;
  if (gender === 'male') {
    bmr = 10 * weight + 6.25 * height - 5 * age + 5;
  } else {
    bmr = 10 * weight + 6.25 * height - 5 * age - 161;
  }

  const tdee = Math.round(bmr * activity);

  let targetCal;
  let tagClass, tagText;
  switch (goal) {
    case 'lose':
      targetCal = tdee - 500;
      tagClass = 'tag-lose'; tagText = '温和减脂';
      break;
    case 'lose-fast':
      targetCal = tdee - 1000;
      tagClass = 'tag-lose'; tagText = '快速减脂';
      break;
    case 'gain':
      targetCal = tdee + 500;
      tagClass = 'tag-gain'; tagText = '增肌';
      break;
    default:
      targetCal = tdee;
      tagClass = 'tag-keep'; tagText = '维持体重';
  }

  targetCal = Math.max(1200, Math.round(targetCal));

  // Macro split
  let proteinPct, fatPct, carbPct;
  if (goal === 'lose' || goal === 'lose-fast') {
    proteinPct = 0.35; fatPct = 0.25; carbPct = 0.40;
  } else if (goal === 'gain') {
    proteinPct = 0.30; fatPct = 0.25; carbPct = 0.45;
  } else {
    proteinPct = 0.25; fatPct = 0.30; carbPct = 0.45;
  }

  const proteinG = Math.round(targetCal * proteinPct / 4);
  const fatG = Math.round(targetCal * fatPct / 9);
  const carbsG = Math.round(targetCal * carbPct / 4);

  document.getElementById('bmr').textContent = Math.round(bmr);
  document.getElementById('tdee').textContent = tdee;
  document.getElementById('target').innerHTML = targetCal + ' <span class="tag ' + tagClass + '">' + tagText + '</span>';

  document.getElementById('macro-protein').textContent = proteinG + ' g';
  document.getElementById('macro-fat').textContent = fatG + ' g';
  document.getElementById('macro-carbs').textContent = carbsG + ' g';
  document.getElementById('macro-card').style.display = 'block';

  document.getElementById('result').classList.add('show');
}
</script>

</body>
</html>
